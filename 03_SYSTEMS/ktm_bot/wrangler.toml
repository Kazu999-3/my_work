name = "ktm-os-worker"
main = "src/index.js"
compatibility_date = "2024-04-17"

# [vars]
# DISCORD_PUBLIC_KEY = "..."
# DISCORD_TOKEN = "..."
# LOCAL_API_URL = "..."
# PORTAL_API_URL = "https://ktm-portal.vercel.app"

[triggers]
# 定期カスタム関連のスケジュール（時刻はJST）
#  "0 11 * * 3,5,6" : 水金土20時 人数集計・直前通知（人数不足なら欠員アラート）(UTC 11:00)
#  "0 9 * * 6"      : 土曜18時 その日の夜21時開催の定期カスタム募集自動投稿 (UTC 09:00)
#  "*/10 * * * *"   : 10分ごと 開始時刻が近い募集の参加者へリマインド(D1)
crons = [ "0 11 * * 3,5,6", "0 9 * * 6", "*/10 * * * *" ]
