name = "ktm-os-worker"
main = "src/index.js"
compatibility_date = "2024-04-17"

# [vars]
# DISCORD_PUBLIC_KEY = "..."
# DISCORD_TOKEN = "..."
# LOCAL_API_URL = "..."
# PORTAL_API_URL = "https://ktm-portal.vercel.app"

[triggers]
# 定期カスタム関連のスケジュール（時刻はJST）
#  "0 12 * * 6"   : 土21時 定期カスタム募集を自動投稿
#  "0 11 * * 5,6" : 金土20時 募集の直前通知（人数不足なら欠員アラート）
#  "*/10 * * * *" : 10分ごと 開始時刻が近い募集の参加者へリマインド(D1)
crons = [ "0 12 * * 6", "0 11 * * 5,6", "*/10 * * * *" ]
