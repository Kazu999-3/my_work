name: Antigravity Overseas Scout

# 海外の攻略情報からチャンピオン辞典を更新する。
# 更新が古いチャンピオンから順に、1回あたり SCOUT_BATCH_SIZE 体を処理する。
# 1日3回 × 8体 = 24体/日 なので、全170体を約1週間で一巡する。
on:
  schedule:
    # 4:00 / 12:00 / 20:00 (JST) = 19:00 / 3:00 / 11:00 (UTC)
    - cron: '0 19,3,11 * * *'
  workflow_dispatch:
    inputs:
      batch_size:
        description: '1回で更新するチャンピオン数'
        required: false
        default: '8'

jobs:
  run-scout:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r 03_SYSTEMS/requirements.txt
          
      - name: Run Overseas Scout
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_FREE: ${{ secrets.GEMINI_API_KEY_FREE }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          # settings や herald を v2_CORE.* で解決できるようにする
          PYTHONPATH: 03_SYSTEMS
          SCOUT_BATCH_SIZE: ${{ github.event.inputs.batch_size || '8' }}
        run: |
          python 03_SYSTEMS/v2_CORE/_LOL/overseas_scout.py
