    # 豈取律 00:00 (JST 09:00), 06:00 (JST 15:00), 12:00 (JST 21:00) 縺ｫ閾ｪ蜍募ｮ溯｡・    - cron: '0 0,6,12 * * *'
  workflow_dispatch:
    # 謇句虚螳溯｡後・繧ｿ繝ｳ縺ｮ霑ｽ蜉

jobs:
  run-monetization-loop:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r 03_SYSTEMS/requirements.txt
          
      - name: Run Monetization Loop
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          # 繝｢繝阪ち繧､繧ｺ繝ｫ繝ｼ繝暦ｼ・謚慕ｨｿ縲］ote逕滓・縺ｪ縺ｩ・峨・蜊倡匱螳溯｡・          # 窶ｻ辟｡髯舌Ν繝ｼ繝励＠縺ｪ縺・ｈ縺・↓ --once 繝輔Λ繧ｰ遲峨′縺ゅｋ縺ｪ繧我ｻ倅ｸ弱☆繧・          python 03_SYSTEMS/v2_CORE/monetization_loop.py --once || true

