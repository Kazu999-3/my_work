name: KTM Cloud Worker

# PC常駐デーモンの代替(#88)。
#  - prospect: 1日1回、辞典が古いチャンピオンの解説動画を探してキューに積む
#  - youtube: 30分おきに youtube_queue を処理（yt-dlp字幕→Gemini要約→ナレッジ保存）
#  - dict-sync: 3時間おきにナレッジ→チャンピオン辞典の同期（knowledge/sync をチャンクで回す）
#
# prospect が動画を見つける → youtube が解析する → dict-sync が辞典へ反映する、
# という流れで、人手を介さずに辞典が埋まっていく。
# 必要シークレット: SUPABASE_URL, SUPABASE_SERVICE_KEY, GEMINI_API_KEY, KTM_CRON_SECRET

on:
  schedule:
    - cron: '*/30 * * * *'   # youtube worker
    - cron: '7 */3 * * *'    # dict-sync
    # prospect は 3:30 / 11:30 / 19:30 JST の1日3回。
    # 発掘自体はGeminiを使わず、解析待ちが溜まっていれば自動で見送るため、
    # 頻度を上げてもAPIの消費は youtube ジョブの処理速度で頭打ちになる。
    - cron: '30 18,2,10 * * *'
  workflow_dispatch:
    inputs:
      job:
        description: '実行するジョブ'
        required: true
        default: 'both'
        type: choice
        options:
          - both          # youtube + dict-sync
          - youtube       # キューの動画を解析する
          - dict-sync     # ナレッジを辞典へ同期する
          - prospect      # 解説動画を探してキューに積む
      champions:
        description: 'prospect用: 対象を直接指定（例: Ahri,Graves。空なら辞典が古い順）'
        required: false
        default: ''

jobs:
  # 解析対象の動画を自動で発掘してキューに積む（v2_CORE/prospector.py の後継）
  prospect:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'prospect' || (github.event_name == 'schedule' && github.event.schedule == '30 18,2,10 * * *')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Install yt-dlp
        run: pip install -q yt-dlp
      - name: Check Environment
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || secrets.SUPABASE_SERVICE_KEY || secrets.SUPABASE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python scripts/check_env.py
      - name: Prospect videos
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || secrets.SUPABASE_SERVICE_KEY || secrets.SUPABASE_KEY }}
          PROSPECT_CHAMPIONS: ${{ github.event.inputs.champions }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python scripts/prospector.py

  youtube:
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'youtube' || github.event.inputs.job == 'both') || (github.event_name == 'schedule' && github.event.schedule == '*/30 * * * *')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Install dependencies
        run: pip install -q yt-dlp google-genai
      - name: Check Environment
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || secrets.SUPABASE_SERVICE_KEY || secrets.SUPABASE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python scripts/check_env.py
      - name: Process youtube queue
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          # 既存バッチが使っている SUPABASE_KEY を流用（SUPABASE_SERVICE_KEYがあればそちら優先）
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || secrets.SUPABASE_SERVICE_KEY || secrets.SUPABASE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python scripts/youtube_worker.py

  dict-sync:
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'dict-sync' || github.event.inputs.job == 'both') || (github.event_name == 'schedule' && github.event.schedule == '7 */3 * * *')
    runs-on: ubuntu-latest
    steps:
      - name: Run knowledge -> dictionary sync (chunked)
        env:
          CRON_SECRET: ${{ secrets.KTM_CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then echo "::warning::KTM_CRON_SECRET未設定のためスキップ"; exit 0; fi
          BASE="https://my-work-8jbd.vercel.app/api/admin/knowledge/sync"
          OFFSET=0
          for i in $(seq 1 30); do
            RES=$(curl -s -X POST "$BASE" -H "Authorization: Bearer $CRON_SECRET" -H "Content-Type: application/json" -d "{\"offset\":$OFFSET,\"limit\":15}")
            echo "$RES"
            DONE=$(echo "$RES" | python3 -c "import sys,json;d=json.load(sys.stdin);print(d.get('done',True))" 2>/dev/null || echo True)
            NEXT=$(echo "$RES" | python3 -c "import sys,json;d=json.load(sys.stdin);print(d.get('nextOffset') or '')" 2>/dev/null || echo '')
            if [ "$DONE" = "True" ] || [ -z "$NEXT" ]; then echo "同期完了"; break; fi
            OFFSET=$NEXT
          done
