name: Antigravity Sovereign Pulse

# パッチ更新の検知・LoLalytics統計の取得・Discordメンバー同期を定期実行する。
# pulse.py 本体は常駐前提なので、1回だけ実行する run_pulse_once.py を経由する。
on:
  schedule:
    # 6時間おき（毎時だとパッチ検知には過剰で、API消費だけが増えるため）
    - cron: '0 */6 * * *'
  workflow_dispatch:
    # 手動実行のボタンを追加

jobs:
  run-pulse:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r 03_SYSTEMS/requirements.txt
          
      - name: Run Sovereign Pulse
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || secrets.SUPABASE_KEY }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          # settings や ai_helper を v2_CORE.* で解決できるようにする
          PYTHONPATH: 03_SYSTEMS
        run: |
          python 03_SYSTEMS/v2_CORE/run_pulse_once.py
