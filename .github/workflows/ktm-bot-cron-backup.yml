name: KTM Bot Cron Backup

# Cloudflare Workersのcronはbest-effortで稀に発火が飛ぶ(#85)。
# 各定期処理の15分後にGitHub Actionsから /trigger-scheduled を冗長キックする。
# BOT側に二重投稿防止(直近同一通知チェック / recruitments.start_atチェック)があるため、
# 両方発火しても重複投稿にはならない。
#
# 必要なシークレット:
#   KTM_WORKER_URL  : ワーカーの公開URL (例: https://ktm-os-worker.xxxx.workers.dev)
#   KTM_TRIGGER_KEY : /trigger-scheduled の key（未設定ならデフォルト値を使用）

on:
  schedule:
    - cron: '15 11 * * 5,6'  # 金土 20:15 JST → 直前通知のバックアップ
  workflow_dispatch:
    inputs:
      mode:
        description: 'mode (空=直前通知)'
        required: false
        default: ''

jobs:
  kick:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger scheduled handler
        env:
          WORKER_URL: ${{ secrets.KTM_WORKER_URL }}
          TRIGGER_KEY: ${{ secrets.KTM_TRIGGER_KEY }}
        run: |
          if [ -z "$WORKER_URL" ]; then
            echo "::error::KTM_WORKER_URL シークレットが未設定です。リポジトリ Settings > Secrets に追加してください。"
            exit 1
          fi
          KEY="${TRIGGER_KEY:-ktm_v3_internal_secret_2026}"

          # 手動実行なら入力modeを使用。スケジュール実行なら直前通知(mode="")
          MODE="${{ github.event.inputs.mode }}"

          echo "Kicking mode='$MODE'"
          STATUS=$(curl -s -o /tmp/resp.txt -w "%{http_code}" "$WORKER_URL/trigger-scheduled?key=$KEY&mode=$MODE")
          cat /tmp/resp.txt
          if [ "$STATUS" != "200" ]; then
            echo "::error::trigger-scheduled failed with HTTP $STATUS"
            exit 1
          fi
